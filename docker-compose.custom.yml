services:
  # PostgreSQL база данных с безопасной конфигурацией
  postgres:
    container_name: elixir_postgres
    image: postgres:17.5
    restart: unless-stopped

    ports:
      - "${POSTGRES_PORT:-5433}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db-secure.sh:/docker-entrypoint-initdb.d/init-db-secure.sh:ro

    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      POSTGRES_DB: postgres
      # Переменные для init скрипта
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      APP_DB_NAME: ${APP_DB_NAME}

    networks:
      - elixir_network

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER} -d ${APP_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Elixir приложение (используем собранный образ)
  app:
    container_name: ${PROJECT_NAME:-elixir_app}
    image: elixir-dev:latest  # Используем наш универсальный образ
    # Если хотите собрать образ локально, раскомментируйте:
    # build:
    #   context: .
    #   dockerfile: Dockerfile.elixir-dev
    init: true
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    # External ports removed - accessed via nginx-gateway through Docker network
    # For debugging, use: docker exec -it binance_system bash
    expose:
      - "4000"
    ports:
      - "127.0.0.1:${LIVEBOOK_PORT:-8080}:8080" # Livebook (localhost only)

    volumes:
      # Код проекта
      - ${PROJECT_PATH:-./project}:/app

      # Кеши и зависимости (для ускорения)
      - elixir_deps:/app/deps
      - elixir_build:/app/_build

      # Сохранение данных между обновлениями
      - elixir_config:/data/config
      - elixir_vscode:/data/vscode-server
      - elixir_cache:/data/cache

      # SSH ключи (опционально, для git)
      - ${SSH_PATH:-~/.ssh}:/data/ssh:ro

      # /root home (Claude плагины, bash history, конфиги)
      - ./docker/root_home:/root

    working_dir: /app

    # Для разработки - оставляем контейнер запущенным
    command: sleep infinity

    # Для production - раскомментируйте и адаптируйте:
    # command: bash -c "mix deps.get && mix ecto.create && mix ecto.migrate && mix phx.server"

    environment:
      - MIX_ENV=${MIX_ENV:-dev}

      # Database
      - DATABASE_URL=postgresql://${APP_DB_USER}:${APP_DB_PASSWORD}@postgres:5432/${APP_DB_NAME}
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=${APP_DB_USER}
      - PGPASSWORD=${APP_DB_PASSWORD}
      - PGDATABASE=${APP_DB_NAME}
      - APP_DB_USER=${APP_DB_USER}
      - APP_DB_PASSWORD=${APP_DB_PASSWORD}
      - APP_DB_NAME=${APP_DB_NAME}

      # Phoenix
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - PHX_HOST=${PHX_HOST:-localhost}
      - PHX_SERVER=true
      - PORT=4000

      # Encryption (Cloak)
      - CLOAK_KEY=${CLOAK_KEY}

      # API Keys (если нужно, например для Binance)
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY:-}
      - BINANCE_BASE_URL=${BINANCE_BASE_URL:-https://testnet.binance.vision}

    networks:
      - elixir_network

    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          memory: 1G

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis (опционально, для кеширования)
  redis:
    container_name: elixir_redis
    image: redis:7-alpine
    restart: unless-stopped
    profiles: ["full"]  # Запускается только с --profile full

    ports:
      - "${REDIS_PORT:-6379}:6379"

    volumes:
      - redis_data:/data

    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}

    networks:
      - elixir_network

    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
    name: ${PROJECT_NAME:-elixir}_postgres_data
  elixir_deps:
    name: ${PROJECT_NAME:-elixir}_deps
  elixir_build:
    name: ${PROJECT_NAME:-elixir}_build
  elixir_config:
    name: ${PROJECT_NAME:-elixir}_config
  elixir_vscode:
    name: ${PROJECT_NAME:-elixir}_vscode
  elixir_cache:
    name: ${PROJECT_NAME:-elixir}_cache
  redis_data:
    name: ${PROJECT_NAME:-elixir}_redis_data

networks:
  elixir_network:
    name: ${PROJECT_NAME:-elixir}_network
    driver: bridge
    ipam:
      config:
        - subnet: 172.26.0.0/16

# ============================================
# Команды для управления:
# ============================================
#
# Запуск:
#   docker compose -f docker-compose.elixir-project.yml up -d
#
# Запуск с Redis:
#   docker compose -f docker-compose.elixir-project.yml --profile full up -d
#
# Подключение к контейнеру приложения:
#   docker compose -f docker-compose.elixir-project.yml exec app bash
#
# Логи:
#   docker compose -f docker-compose.elixir-project.yml logs -f app
#
# Остановка:
#   docker compose -f docker-compose.elixir-project.yml down
#
# Полная очистка (ВНИМАНИЕ: удалит все данные!):
#   docker compose -f docker-compose.elixir-project.yml down -v
#
# Запуск Phoenix сервера внутри контейнера:
#   docker compose -f docker-compose.elixir-project.yml exec app bash -c "mix phx.server"
#
# Запуск миграций:
#   docker compose -f docker-compose.elixir-project.yml exec app bash -c "mix ecto.migrate"
